<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI图片生成节点复刻</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 完美还原背景灰点阵矩阵 */
        body {
            background-color: #09090b; /* 极暗的背景色 */
            background-image: radial-gradient(circle at center, #3f3f46 1px, transparent 1px);
            background-size: 32px 32px; /* 点阵间距 */
            background-position: 0 0;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 隐藏滚动条 */
        textarea::-webkit-scrollbar {
            display: none;
        }
        
        /* 弹窗动画 */
        .fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- 主容器 -->
    <div class="relative w-[480px] flex flex-col gap-3">
        
        <!-- 头部标题 -->
        <div class="flex items-center gap-2 px-1">
            <span class="text-xl">🍌</span>
            <span class="text-[#a1a1aa] text-sm font-medium tracking-wide">生成图片</span>
        </div>

        <!-- 卡片主体 (节点) -->
        <div class="relative bg-[#18181b] rounded-xl border border-[#27272a] shadow-lg flex flex-col h-[380px]">
            
            <!-- 左侧节点连接点 (原图中左侧的小灰点) -->
            <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-[#52525b] border-2 border-[#18181b]"></div>

            <!-- 输入区域 -->
            <textarea 
                class="w-full flex-1 bg-transparent border-none outline-none resize-none p-6 text-[#e4e4e7] placeholder-[#52525b] text-base"
                placeholder="输入提示词..."></textarea>

            <!-- 底部控制栏 -->
            <div class="p-5 pt-0 flex flex-col gap-3">
                
                <!-- 快捷提示词链接 -->
                <div class="flex items-center gap-1 cursor-pointer w-max group">
                    <span class="text-[#e4e4e7] text-sm font-medium group-hover:text-white transition-colors">常用提示词库</span>
                    <svg class="w-3.5 h-3.5 text-[#a1a1aa] group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>

                <!-- 按钮组 -->
                <div class="flex items-center gap-2.5">
                    <!-- 模型选择 -->
                    <div class="flex-1 bg-transparent border border-[#3f3f46] rounded-md px-3 py-1.5 text-sm text-[#d4d4d8] cursor-pointer hover:bg-[#27272a] transition-colors flex items-center justify-between">
                        <span>Nano Banana Pro</span>
                    </div>
                    
                    <!-- 参数按钮 -->
                    <button class="bg-transparent border border-[#3f3f46] rounded-md px-3 py-1.5 text-sm text-[#d4d4d8] hover:bg-[#27272a] transition-colors">1:1</button>
                    <button class="bg-transparent border border-[#3f3f46] rounded-md px-3 py-1.5 text-sm text-[#d4d4d8] hover:bg-[#27272a] transition-colors">1K</button>
                    <button class="bg-transparent border border-[#3f3f46] rounded-md px-3 py-1.5 text-sm text-[#d4d4d8] hover:bg-[#27272a] transition-colors">1张</button>
                    <button class="bg-transparent border border-[#3f3f46] rounded-md px-3 py-1.5 text-sm text-[#d4d4d8] hover:bg-[#27272a] transition-colors">异步</button>
                    
                    <!-- 播放/生成按钮 (点击演示弹窗) -->
                    <button id="saveBtn" class="bg-transparent border border-[#3f3f46] rounded-md p-1.5 text-[#d4d4d8] hover:bg-white hover:text-black transition-colors flex items-center justify-center group" title="点击演示存储/生成状态">
                        <svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>

                    <!-- 展开按钮 -->
                    <button class="text-[#71717a] hover:text-[#d4d4d8] transition-colors ml-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14v6h6M20 10V4h-6M4 20l7-7M20 4l-7 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- 补充设计：点击存储/生成后的状态弹窗 (默认隐藏) -->
            <!-- 严格遵守暗黑风格，不瞎设计，采用极简的毛玻璃Toast居中覆盖 -->
            <!-- ========================================== -->
            <div id="saveToast" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#27272a]/90 backdrop-blur-sm border border-[#3f3f46] text-[#e4e4e7] px-4 py-2.5 rounded-lg shadow-2xl flex items-center gap-2.5 z-10">
                <!-- 成功 Check 图标 -->
                <div class="bg-[#10b981]/20 p-1 rounded-full">
                    <svg class="w-3.5 h-3.5 text-[#10b981]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <span class="text-sm font-medium tracking-wide">参数已存储并加入队列</span>
            </div>

        </div>
    </div>

    <script>
        // 简单的交互脚本：点击播放按钮演示你要求的“存储后状态弹窗”
        const saveBtn = document.getElementById('saveBtn');
        const saveToast = document.getElementById('saveToast');
        let toastTimeout;

        saveBtn.addEventListener('click', () => {
            // 清除之前的定时器
            if(toastTimeout) clearTimeout(toastTimeout);
            
            // 显示弹窗并添加动画类
            saveToast.classList.remove('hidden');
            saveToast.classList.add('fade-in-up');
            
            // 按钮产生按压反馈
            saveBtn.style.transform = "scale(0.95)";
            setTimeout(() => { saveBtn.style.transform = "scale(1)"; }, 150);

            // 2.5秒后自动隐藏弹窗
            toastTimeout = setTimeout(() => {
                saveToast.classList.add('hidden');
                saveToast.classList.remove('fade-in-up');
            }, 2500);
        });
    </script>
</body>
</html>
