<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片输入组件 - 完整复刻交互版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 背景点状网格复刻 */
        .bg-dot-grid {
            background-color: #0b0c0e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* 自定义深色卡片背景 */
        .bg-card-dark { background-color: #18191c; }
        .bg-btn-dark { background-color: #1e2023; }
        .bg-tool-dark { background-color: #2a2d32; }
    </style>
</head>
<body class="bg-dot-grid text-neutral-300 min-h-screen p-8 md:p-16 font-sans antialiased overflow-x-hidden">

    <div class="max-w-7xl mx-auto space-y-24">
        
        <!-- ================= 第一部分：三种基础状态对比 ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">组件状态演进</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                
                <!-- 状态 1: 默认态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 01: Default</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">图片输入</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border border-transparent">
                            <button class="border border-neutral-700 bg-btn-dark hover:border-neutral-500 text-neutral-200 text-sm px-5 py-2 rounded-xl transition-all">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴<br>支持音频、视频、图片素材</div>
                        </div>
                    </div>
                </div>

                <!-- 状态 2: 交互态 (带弧形菜单) -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 02: Tool Interaction</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">图片输入</div>
                        <!-- 主体卡片 -->
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center relative border border-neutral-700">
                            <!-- 右上关闭 -->
                            <button class="absolute -top-2.5 -right-2.5 w-7 h-7 bg-tool-dark border border-neutral-700 rounded-full flex items-center justify-center text-neutral-400 hover:text-white"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>

                            <!-- 弧形菜单结构 -->
                            <div class="absolute -right-5 top-1/2 -translate-y-1/2 flex items-center">
                                <button class="w-10 h-10 bg-card-dark border border-neutral-500 rounded-full flex items-center justify-center text-white shadow-xl z-20"><i data-lucide="plus" class="w-6 h-6"></i></button>
                                <!-- 弧形图标组 -->
                                <div class="ml-6 flex flex-col gap-2.5">
                                    <button class="w-9 h-9 bg-tool-dark border border-neutral-800 rounded-full flex items-center justify-center text-neutral-400 translate-x-0"><i data-lucide="palette" class="w-4 h-4"></i></button>
                                    <button class="w-9 h-9 bg-tool-dark border border-neutral-800 rounded-full flex items-center justify-center text-neutral-400 translate-x-4"><i data-lucide="film" class="w-4 h-4"></i></button>
                                    <button class="w-9 h-9 bg-tool-dark border border-neutral-800 rounded-full flex items-center justify-center text-neutral-400 translate-x-4"><i data-lucide="layout-grid" class="w-4 h-4"></i></button>
                                    <button class="w-9 h-9 bg-tool-dark border border-neutral-800 rounded-full flex items-center justify-center text-neutral-400 translate-x-0"><i data-lucide="scissors" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 状态 3: 激活/聚焦态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 03: Focused / Selected</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">图片输入</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border-2 border-neutral-500 shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- ================= 第二部分：存储交互演示 ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">功能整合交互演示</h2>
            
            <div class="bg-[#121316] rounded-[32px] border border-neutral-800 p-12 flex flex-col items-center justify-center min-h-[500px] relative overflow-hidden shadow-inner">
                
                <p class="text-neutral-500 mb-8 text-sm">点击下方按钮模拟素材存储流程</p>
                
                <button onclick="toggleModal()" class="group bg-neutral-200 hover:bg-white text-neutral-900 px-8 py-4 rounded-2xl font-semibold transition-all flex items-center gap-3 shadow-[0_10px_30px_rgba(0,0,0,0.5)] active:scale-95">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    存储当前素材
                    <kbd class="ml-2 px-2 py-0.5 bg-neutral-900 text-neutral-400 text-[10px] rounded border border-neutral-700 group-hover:border-neutral-500">Ctrl + S</kbd>
                </button>

                <!-- 存储弹窗 (Modal) -->
                <div id="modal-backdrop" class="hidden absolute inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 p-4 transition-all duration-300">
                    <div class="w-full max-w-[480px] bg-card-dark rounded-3xl border border-neutral-800 shadow-2xl p-8 flex flex-col animate-in fade-in zoom-in duration-200">
                        
                        <!-- Header -->
                        <div class="flex items-center justify-between mb-8">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-neutral-200">
                                    <i data-lucide="cloud-upload" class="w-5 h-5"></i>
                                </div>
                                <h3 class="text-lg font-semibold text-white">存储素材至云端</h3>
                            </div>
                            <button onclick="toggleModal()" class="w-8 h-8 rounded-full hover:bg-neutral-800 flex items-center justify-center text-neutral-500 hover:text-white transition-colors">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>

                        <!-- Content -->
                        <div class="space-y-6">
                            <!-- Preview -->
                            <div class="flex items-center gap-4 bg-btn-dark p-4 rounded-2xl border border-neutral-800">
                                <div class="w-16 h-16 bg-tool-dark rounded-xl flex items-center justify-center">
                                    <i data-lucide="image" class="w-8 h-8 text-neutral-500"></i>
                                </div>
                                <div>
                                    <div class="text-sm text-white font-medium">Concept_Design_v1.png</div>
                                    <div class="text-xs text-neutral-500 mt-1">2.4 MB · 1440 × 900 px</div>
                                </div>
                            </div>

                            <!-- Path Select -->
                            <div>
                                <label class="text-[11px] text-neutral-500 uppercase mb-2 block font-bold tracking-widest">保存路径</label>
                                <div class="relative">
                                    <select class="w-full bg-btn-dark border border-neutral-700 rounded-xl px-4 py-3 text-sm text-white appearance-none focus:outline-none focus:border-neutral-400 transition-all cursor-pointer">
                                        <option>项目素材 / UI 设计稿</option>
                                        <option>个人收藏 / 灵感参考</option>
                                        <option>+ 新建文件夹</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500 pointer-events-none"></i>
                                </div>
                            </div>

                            <!-- Tags -->
                            <div>
                                <label class="text-[11px] text-neutral-500 uppercase mb-2 block font-bold tracking-widest">添加标签</label>
                                <div class="flex flex-wrap gap-2 p-3 bg-btn-dark border border-neutral-700 rounded-xl min-h-[50px]">
                                    <span class="bg-tool-dark text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-2 border border-neutral-700 text-neutral-200">
                                        #Dark_UI <i data-lucide="x" class="w-3 h-3 text-neutral-500 cursor-pointer"></i>
                                    </span>
                                    <button class="text-[11px] text-neutral-500 hover:text-white px-2 flex items-center gap-1 transition-colors">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Footer Actions -->
                        <div class="flex items-center justify-end gap-4 mt-10 pt-6 border-t border-neutral-800">
                            <button onclick="toggleModal()" class="text-sm text-neutral-500 hover:text-white font-medium transition-colors">取消</button>
                            <button onclick="toggleModal()" class="bg-neutral-200 hover:bg-white text-neutral-900 px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all">确认保存</button>
                        </div>

                    </div>
                </div>

            </div>
        </section>
    </div>

    <script>
        // 初始化图标
        lucide.createIcons();

        // 弹窗控制逻辑
        function toggleModal() {
            const modal = document.getElementById('modal-backdrop');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden'; // 防止背景滚动
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }
        }

        // 快捷键监听 (Ctrl+S)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                toggleModal();
            }
        });
    </script>
</body>
</html>
