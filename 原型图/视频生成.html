<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成视频 UI 复刻</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 定义背景点阵图样式，完美还原背景的网格点点 */
        .bg-dot-pattern {
            background-color: #050505;
            background-image: radial-gradient(#333333 1px, transparent 1px);
            background-size: 40px 40px; /* 控制点阵间距 */
            background-position: 0 0;
        }
        
        /* 移除 textarea 的默认滚动条，使其更符合 UI 原型 */
        textarea::-webkit-scrollbar {
            display: none;
        }
        textarea {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-dot-pattern min-h-screen flex items-center justify-center relative font-sans antialiased text-white selection:bg-zinc-700 selection:text-white">

    <!-- 主体容器 -->
    <div class="relative w-[540px] flex flex-col gap-3">
        
        <!-- Header: Logo与标题 -->
        <div class="flex items-center gap-2 px-1">
            <!-- 还原 Logo 图标 -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 模拟渐变与叠加形状 -->
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="url(#paint0_linear)"/>
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22" fill="#00FF9D" style="mix-blend-mode: color-dodge;"/>
                <path d="M22 12C22 6.48 17.52 2 12 2" fill="#7B61FF" style="mix-blend-mode: color-dodge;"/>
                <path d="M12 22C17.52 22 22 17.52 22 12" fill="#00E0FF" style="mix-blend-mode: color-dodge;"/>
                <defs>
                    <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#7B61FF"/>
                        <stop offset="0.5" stop-color="#00E0FF"/>
                        <stop offset="1" stop-color="#00FF9D"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="text-[15px] text-[#A1A1AA] tracking-wide font-medium">生成视频</span>
        </div>

        <!-- 编辑器卡片主体 -->
        <div class="relative bg-[#171717] border border-[#27272A] rounded-xl p-5 h-[420px] flex flex-col shadow-2xl">
            
            <!-- 左侧连接节点 (Node dot) -->
            <div class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-[9px] h-[9px] bg-[#52525B] rounded-full"></div>

            <!-- 文本输入区 -->
            <textarea 
                class="w-full flex-1 bg-transparent resize-none outline-none text-[15px] text-[#E4E4E7] placeholder-[#71717A] leading-relaxed" 
                placeholder="输入提示词..."></textarea>

            <!-- 底部工具栏 -->
            <div class="flex items-center gap-2 mt-4 select-none">
                
                <!-- 模型选择框 -->
                <button class="h-[32px] px-3 border border-[#3F3F46] rounded-md text-[13px] text-[#D4D4D8] bg-transparent hover:bg-[#27272A] transition-colors flex items-center justify-between w-[200px]">
                    <span class="truncate">Seedance 1.0 lite (文生) ...</span>
                </button>

                <!-- 比例选择 -->
                <button class="h-[32px] px-3 border border-[#3F3F46] rounded-md text-[13px] text-[#D4D4D8] bg-transparent hover:bg-[#27272A] transition-colors flex items-center justify-center">
                    16:9
                </button>

                <!-- 时长选择 -->
                <button class="h-[32px] px-3 border border-[#3F3F46] rounded-md text-[13px] text-[#D4D4D8] bg-transparent hover:bg-[#27272A] transition-colors flex items-center justify-center">
                    5s
                </button>

                <!-- 分辨率选择 -->
                <button class="h-[32px] px-3 border border-[#3F3F46] rounded-md text-[13px] text-[#D4D4D8] bg-transparent hover:bg-[#27272A] transition-colors flex items-center justify-center">
                    1080P
                </button>

                <!-- 播放按钮 -->
                <button class="h-[32px] w-[32px] border border-[#3F3F46] rounded-md text-[#D4D4D8] bg-transparent hover:bg-[#27272A] transition-colors flex items-center justify-center group">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" class="translate-x-[1px]">
                        <path d="M6 4L20 12L6 20V4Z" />
                    </svg>
                </button>

                <!-- 全屏/展开按钮 -->
                <button class="h-[32px] w-[28px] text-[#71717A] hover:text-[#D4D4D8] bg-transparent transition-colors flex items-center justify-center ml-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h6v6"></path>
                        <path d="M9 21H3v-6"></path>
                        <path d="M21 3l-7 7"></path>
                        <path d="M3 21l7-7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
